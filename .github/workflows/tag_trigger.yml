name: Tag push to Perf
#on:
  #push:
    #tags:
      #- "v*"
on:
  push:
    branches:
      - trigger-testing
    tags:
      - "v*"

jobs:
  setup-env:
    runs-on: ubuntu-latest
    outputs:
      git-tag: ${{ steps.tag.outputs.version }}
    steps:
      - uses: actions/checkout@v3

      - run: mkdir -p path/to/artifact

      - name: Get the version
        id: tag
        run: |
          echo "version=${GITHUB_REF/refs\/tags\//}" | tee $GITHUB_OUTPUT >> path/to/artifact/output.txt

      - name: Env Values
        run: |
          echo "The environment is Perf" >> path/to/artifact/environment.txt
          echo "The outputs.version is ${{ steps.tag.outputs.version }}" >> path/to/artifact/version.txt
          echo "The outputs.tag is ${{ steps.tag.outputs.tag }}" >> path/to/artifact/tag.txt

      - uses: actions/upload-artifact@v3
        with:
          name: my-artifacts
          path: |
            path/to/artifact/environment.txt
            path/to/artifact/version.txt
            path/to/artifact/tag.txt

