name: Export Secrets to S3
run-name: "Export Secrets to S3"

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  export_secrets:
    name: "export-secrets"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws-us-gov:iam::171875617347:role/project/project-terraform-oidc-role-dev
          aws-region: us-gov-west-1

      - name: Write Secrets to File
        run: |
          cat <<EOF > secrets.env
          AWS_ACCOUNT_NUMBER=${{ secrets.AWS_ACCOUNT_NUMBER }}
          AWS_ARN_REGION=${{ secrets.AWS_ARN_REGION }}
          AWS_REGION=${{ secrets.AWS_REGION }}
          CD_KEY=${{ secrets.CD_KEY }}
          CD_PAT=${{ secrets.CD_PAT }}
          DD_API_KEY=${{ secrets.DD_API_KEY }}
          DEPLOY_KEY=${{ secrets.DEPLOY_KEY }}
          DISPATCH_PAT=${{ secrets.DISPATCH_PAT }}
          OIDC_DEPLOY_ROLE_PREFIX=${{ secrets.OIDC_DEPLOY_ROLE_PREFIX }}
          SCAN_CRITICAL_THRESHOLD=${{ secrets.SCAN_CRITICAL_THRESHOLD }}
          SCAN_HIGH_THRESHOLD=${{ secrets.SCAN_HIGH_THRESHOLD }}
          TASK_DEFINITION_SECRETS_JSON=${{ secrets.TASK_DEFINITION_SECRETS_JSON }}
          VAEC_AWS_ACCESS_KEY_ID=${{ secrets.VAEC_AWS_ACCESS_KEY_ID }}
          VAEC_AWS_SECRET_ACCESS_KEY=${{ secrets.VAEC_AWS_SECRET_ACCESS_KEY }}
          VAEC_DEPLOY_ROLE=${{ secrets.VAEC_DEPLOY_ROLE }}
          VAR_PAT=${{ secrets.VAR_PAT }}
          VA_NOTIFY_PUBLIC_SLACK_URL=${{ secrets.VA_NOTIFY_PUBLIC_SLACK_URL }}
          EOF

      - name: Upload Secrets to S3
        run: |
          aws s3 cp secrets.env s3://vanotify-gh-parameters/${{ github.event.repository.name }}/secrets.env \
            --sse AES256

      - name: Cleanup Secret File
        if: always()
        run: rm -f secrets.env